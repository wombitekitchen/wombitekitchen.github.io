<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wombite Kitchen – Einladung</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="../icon.png">
  <meta property="og:title" content="Du wurdest eingeladen!">
  <meta property="og:description" content="Jemand teilt ein Kochbuch oder eine Einkaufsliste mit dir auf Wombite Kitchen.">
  <meta property="og:image" content="https://wombitekitchen.com/og-image.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FAFAF8;
      color: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 400px; }
    img { width: 80px; height: 80px; border-radius: 18px; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #388E3C; }
    p { color: #666; margin-bottom: 1.5rem; line-height: 1.5; }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      margin: 0.5rem;
      transition: transform 0.2s;
    }
    .btn:hover { transform: scale(1.03); }
    .btn-primary { background: #388E3C; color: #fff; }
    .btn-outline { background: #fff; color: #1A1A1A; border: 2px solid #E0E0E0; }
    .info { font-size: 0.85rem; color: #999; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <img src="../icon.png" alt="Wombite Kitchen">
    <h1>Du wurdest eingeladen!</h1>
    <p>Jemand teilt etwas Leckeres mit dir auf Wombite Kitchen.</p>
    <div id="buttons">
      <a id="open-app" href="#" class="btn btn-primary">In der App öffnen</a>
      <br>
      <a id="store-link" href="#" class="btn btn-outline">App herunterladen</a>
    </div>
    <p class="info">Die Einladung wird automatisch in der App geöffnet.</p>
  </div>

  <script>
    (function() {
      // Invite-Code aus URL-Pfad lesen: /invite/{code} oder /invite/?code={code}
      var pathParts = window.location.pathname.split('/').filter(Boolean);
      var params = new URLSearchParams(window.location.search);
      var inviteCode = null;

      // /invite/ABC123 → pathParts = ['invite', 'ABC123']
      if (pathParts.length >= 2 && pathParts[0] === 'invite') {
        inviteCode = pathParts[1];
      }
      // Fallback: /invite/?code=ABC123
      if (!inviteCode) {
        inviteCode = params.get('code');
      }

      if (!inviteCode) {
        document.querySelector('h1').textContent = 'Ungültiger Link';
        document.querySelector('p').textContent = 'Diese Einladung ist leider nicht gültig.';
        document.getElementById('buttons').style.display = 'none';
        return;
      }

      // Deep Link zur App (Custom Scheme)
      var appDeepLink = 'io.supabase.wombitekitchen://invite/' + inviteCode;

      // Store-Links
      var IOS_STORE = 'https://apps.apple.com/app/wombite-kitchen/id6738030818';
      var PLAY_STORE = 'https://play.google.com/store/apps/details?id=com.wombite.app';

      // Plattform erkennen
      var ua = navigator.userAgent || '';
      var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      var isAndroid = /Android/.test(ua);

      var storeUrl = isIOS ? IOS_STORE : (isAndroid ? PLAY_STORE : IOS_STORE);

      // Buttons konfigurieren
      document.getElementById('open-app').href = appDeepLink;
      document.getElementById('store-link').href = storeUrl;

      // Auf Mobile: Versuche sofort die App zu öffnen
      if (isIOS || isAndroid) {
        // Deep Link versuchen — falls App installiert, öffnet sie sich
        window.location.href = appDeepLink;

        // Fallback: Nach 1.5s zum Store wenn App nicht geöffnet hat
        setTimeout(function() {
          // Prüfe ob Seite noch sichtbar (= App hat nicht geöffnet)
          if (!document.hidden) {
            window.location.href = storeUrl;
          }
        }, 1500);
      }
    })();
  </script>
</body>
</html>
