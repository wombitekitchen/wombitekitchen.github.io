<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wombite Kitchen – Download</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="../icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FAFAF8;
      color: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 400px; }
    img { width: 80px; height: 80px; border-radius: 18px; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #388E3C; }
    p { color: #666; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      margin: 0.5rem;
      transition: transform 0.2s;
    }
    .btn:hover { transform: scale(1.03); }
    .btn-dark { background: #1A1A1A; color: #fff; }
    .btn-outline { background: #fff; color: #1A1A1A; border: 2px solid #E0E0E0; }
    .redirect-msg { font-size: 0.85rem; color: #999; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <img src="../icon.png" alt="Wombite Kitchen">
    <h1>Wombite Kitchen</h1>
    <p>Du wirst zum Store weitergeleitet&hellip;</p>
    <div>
      <a id="ios-link" href="#" class="btn btn-dark">App Store</a>
      <a id="android-link" href="#" class="btn btn-outline">Google Play</a>
    </div>
    <p class="redirect-msg">Falls die Weiterleitung nicht klappt, klicke auf den passenden Button.</p>
  </div>

  <script>
    (function() {
      var IOS_BASE = 'https://apps.apple.com/app/wombite-kitchen/id6738030818';
      var PLAY_BASE = 'https://play.google.com/store/apps/details?id=com.wombite.app';
      var LANDING = 'https://wombitekitchen.com';
      var PROVIDER_TOKEN = '126584103';

      // Campaign aus URL lesen: ?c=instagram oder Hash #instagram
      var params = new URLSearchParams(window.location.search);
      var campaign = params.get('c') || window.location.hash.replace('#', '') || 'direct';
      campaign = campaign.replace(/[^a-zA-Z0-9_-]/g, '').substring(0, 40);

      // Store-URLs mit Tracking bauen
      var iosUrl = IOS_BASE + '?pt=' + PROVIDER_TOKEN + '&ct=' + campaign;
      var playUrl = PLAY_BASE + '&utm_source=' + campaign + '&utm_medium=redirect&utm_campaign=go_link';

      // Links setzen
      document.getElementById('ios-link').href = iosUrl;
      document.getElementById('android-link').href = playUrl;

      // Plattform erkennen und weiterleiten
      var ua = navigator.userAgent || '';
      var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      var isAndroid = /Android/.test(ua);

      if (isIOS) {
        window.location.href = iosUrl;
      } else if (isAndroid) {
        window.location.href = playUrl;
      }
      // Desktop: kein Redirect, User sieht beide Buttons
    })();
  </script>
</body>
</html>
